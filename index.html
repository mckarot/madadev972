<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@splinetool/viewer@1.12.1/build/spline-viewer.js"></script>
    <style>
      /* FORCE CURSOR EVERYWHERE WITH TOP-LEFT HOTSPOT */
      *, *::before, *::after {
        cursor: url('/cursor-v2-small.png') 0 0, auto !important;
      }
      a, button, [role="button"], input, select, textarea, .cursor-pointer, spline-viewer {
        cursor: url('/cursor-v2-small.png') 0 0, pointer !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
